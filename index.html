<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Ailin & Melaine's Birthday Party</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <header>
    <h1>You're Invited to Ailin & Melaine's Taco Birthday Party!</h1>
  </header>
  <main>
    <section class="details">
      <h2>Event Details</h2>
      <p><strong>Date:</strong> Friday, January 24, 2025</p>
      <p><strong>Time:</strong> 8:00 PM</p>
      <p><strong>Location:</strong> Meli's house </p>
      <p><strong>Theme:</strong> Taco Fiesta! 🌮 Come hungry and ready for fun!</p>
    </section>
    <section class="rsvp">
      <h2>RSVP</h2>
      <form action="https://formspree.io/f/YOUR_FORM_ID" method="POST">
        <label for="name">Your Name:</label>
        <input type="text" id="name" name="name" required>
        
        <label for="email">Your Email:</label>
        <input type="email" id="email" name="email" required>
        
        <label for="guests">Number of Guests:</label>
        <input type="number" id="guests" name="guests" required>
        
        <button type="submit">Submit RSVP</button>
      </form>
    </section>
  </main>
  <footer>
    <p>We can't wait to celebrate with you! 🌮🎉</p>
  </footer>
</body>
</html>
